version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: recruitment_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: hr-helper-backend
    restart: always
    depends_on:
      - db
      - python-ai
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-8080}
    volumes:
      - ./apps/backend/uploads:/app/uploads
      
  python-ai:
    build:
      context: ./apps/python_ai
      dockerfile: Dockerfile
    container_name: hr-helper-ai
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:${BACKEND_PORT:-3000}
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE}
    container_name: hr-helper-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data: